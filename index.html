<script>
async function routePublic(section) {
  const html = await loadPage(section);
  renderPublicLayout(html, '/' + section);
}

async function routePublicDetail(id) {
  const html = await loadPage('vida-estudiantil-detalle');
  renderPublicLayout(html, '/vida-estudiantil');
  if (typeof initVidaEstudiantilDetalle === 'function') {
    initVidaEstudiantilDetalle(id);
  }
}

async function routeLanding() {
  const html = await loadPage('landing');
  renderPublicLayout(html, '/');
}

async function routeLogin() {
  const html = await loadPage('login');
  renderPublicPage(html);
  document.querySelectorAll('[data-role]').forEach(btn => {
    btn.addEventListener('click', () => {
      Auth.login(btn.dataset.role);
      Router.navigate('/dashboard/' + btn.dataset.role);
    });
  });
}

async function routeDashboard(role) {
  if (!Auth.isLoggedIn()) {
    Router.navigate('/login');
    return;
  }
  const currentRole = Auth.getRole();
  if (role !== currentRole) {
    Router.navigate('/dashboard/' + currentRole);
    return;
  }
  const pageMap = {
    estudiante: 'dashboard/estudiante',
    administrativo: 'dashboard/administrativo',
    docente: 'dashboard/docente',
    centro: 'dashboard/centro',
    egresado: 'dashboard/egresado',
    empresa: 'dashboard/empresa',
    laboratorio: 'dashboard/laboratorio',
    admin: 'dashboard/admin-web',
  };
  const path = pageMap[role] || 'dashboard/estudiante';
  const html = await loadPage(path);
  Components.render(Auth.getSession(), html);
}

async function routeGeneric(page) {
  if (!Auth.isLoggedIn()) {
    Router.navigate('/login');
    return;
  }
  const html = await loadPage(page);
  Components.render(Auth.getSession(), html);
}

async function routeDashboardSub(role, section) {
  if (!Auth.isLoggedIn()) { Router.navigate('/login'); return; }
  if (role !== Auth.getRole()) { Router.navigate('/dashboard/' + Auth.getRole()); return; }
  const file = 'dashboard/' + role + '-' + section;
  const html = await loadPage(file);
  Components.render(Auth.getSession(), html);
}
