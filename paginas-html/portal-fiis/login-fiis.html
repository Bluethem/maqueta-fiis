<style>
        .geometric-pattern {
            background-color: #F8F9FA;
            background-image: radial-gradient(#E5E5E5 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="geometric-pattern min-h-screen flex items-center justify-center font-body-md text-on-surface p-margin-mobile">
<main class="w-full max-w-[440px] flex flex-col gap-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Header / Logo Area -->
<header class="flex flex-col items-center text-center gap-2">
<div class="w-16 h-16 bg-white rounded-xl shadow-sm border border-border-subtle flex items-center justify-center mb-2 overflow-hidden">
<img alt="FIIS UNI Logo" class="w-12 h-12 object-contain" data-alt="A professional high-resolution vector logo for the Faculty of Industrial Engineering and Systems at UNI. The logo is minimalist and corporate, featuring architectural geometric elements and a sophisticated teal and white color scheme. It is presented on a clean white background with soft studio lighting to emphasize its academic authority and modern digital identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHmYMHNhJqwbTFHOuJNI1-49tfKUE6oM0_-IipHsv_9llST_qM-zrGMmutdyy-EtcHZnmVhjTdSxgEAbn98bPavFNKz_A7s_puL8ofcFUZuQqH2etoWvbmOxyitcqzzeXxzK0F7gDO24eX7fT6pYi73sKz7eF2KqUyir9W1CFcDSsU9FJM3HE1qbF2OZnr_aV8_AO8vpCXBn4tBlDEGTJWA9H9lkw82KZS-4R0TnOHA68U0bZAft7Y5ivNKNCLG2COVPuthmATwDKh">
</div>
<h1 class="font-headline-lg text-headline-lg text-secondary">Portal FIIS</h1>
<p class="font-body-md text-body-md text-text-secondary">Ingresa con tu cuenta institucional</p>
</header>
<!-- Login Card -->
<section class="bg-white p-margin-desktop rounded-xl border border-border-subtle shadow-sm">
<form action="#" class="flex flex-col gap-gutter">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="email">Correo electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-border-subtle rounded-lg focus:ring-1 focus:ring-secondary focus:border-secondary transition-all outline-none text-body-md" id="email" name="email" placeholder="usuario@uni.edu.pe" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Contraseña</label>
<a class="font-label-sm text-label-sm text-secondary hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-white border border-border-subtle rounded-lg focus:ring-1 focus:ring-secondary focus:border-secondary transition-all outline-none text-body-md" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full bg-secondary hover:bg-[#167d5e] text-white font-label-md py-3.5 rounded-lg transition-all active:scale-[0.98] flex justify-center items-center gap-2" type="submit">
                    Iniciar sesión
                </button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-border-subtle"></div>
<span class="flex-shrink mx-4 text-label-sm text-outline font-normal">o continúa con</span>
<div class="flex-grow border-t border-border-subtle"></div>
</div>
<!-- Google Button -->
<button class="w-full border-2 border-secondary text-secondary font-label-md py-3 rounded-lg hover:bg-secondary-container/10 transition-all flex justify-center items-center gap-3 active:scale-[0.98]" type="button">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6BBxrE4_iuSkbEEBTRBiAaz4DXYKHIkOF_GiuLuji6ea2sXvkfd6SoAf-nMZdC7nx-SUqTj14AJten_7abxgLz306dno3uemyulXuU7UuTg-v8da1DkYj3Jzmk924g48swu6Frnrm5kybaHnbBw8ApKdwW5ttqS7dPP8LsvXPceNVnklKXX-_A0uVRF7Sc-83c0WK406fMJvV2f9jxrvvNHW9uzmrLCI1QMF4LrNuISimF2Rvb9jAH9lSEzOPdIjUDdrA-F_aUogl">
                    Ingresar con Google UNI
                </button>
</form>
</section>
<!-- Footer Links & Help -->
<footer class="flex flex-col gap-6 text-center">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-secondary transition-colors flex items-center justify-center gap-1 group" href="#">
                ¿Primera vez? <span class="text-secondary font-bold group-hover:translate-x-1 transition-transform">Solicita tu acceso →</span>
</a>
<div class="p-4 bg-surface-container-low rounded-lg border border-border-subtle/50">
<p class="font-label-sm text-label-sm text-text-secondary flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">info</span>
                    El sistema detectará automáticamente tu rol al ingresar
                </p>
</div>
<p class="font-label-sm text-label-sm text-outline">
                © 2024 Facultad de Ingeniería Industrial y de Sistemas - UNI
            </p>
</footer>
</main>
<script>
        // Micro-interaction for password visibility toggle
        const toggleBtn = document.querySelector('button[type="button"] span.material-symbols-outlined');
        const passInput = document.querySelector('#password');
        
        if (toggleBtn && passInput) {
            toggleBtn.parentElement.addEventListener('click', () => {
                if (passInput.type === 'password') {
                    passInput.type = 'text';
                    toggleBtn.innerText = 'visibility_off';
                } else {
                    passInput.type = 'password';
                    toggleBtn.innerText = 'visibility';
                }
            });
        }

        // Form submission animation mock
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Validando...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Bienvenido';
                btn.classList.add('bg-success');
            }, 1500);
        });
    </script>
</body></html>
