<div class="page-enter space-y-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h2 class="text-2xl font-bold text-on-surface">Proponer Evento</h2>
      <p class="text-text-secondary text-sm mt-0.5">Propón charlas, talleres o webinars para la comunidad FIIS</p>
    </div>
  </div>

  <!-- Form -->
  <div class="bg-white rounded-xl border border-border-subtle shadow-sm overflow-hidden">
    <div class="px-5 py-4 border-b border-border-subtle">
      <h3 class="text-base font-bold text-on-surface">Detalles del evento</h3>
    </div>
    <div class="p-5 space-y-5">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div class="space-y-1.5 md:col-span-2">
          <label class="text-sm font-semibold text-on-surface">Título del evento</label>
          <input type="text" placeholder="Ej: Taller de Lean Manufacturing aplicado a la industria" class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30">
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-on-surface">Tipo de evento</label>
          <select class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30">
            <option value="">Seleccionar tipo</option>
            <option>Charla técnica</option>
            <option>Taller / Workshop</option>
            <option>Webinar</option>
            <option>Feria de reclutamiento</option>
            <option>Conferencia</option>
            <option>Visita industrial</option>
          </select>
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-on-surface">Aforo máximo</label>
          <input type="number" placeholder="Ej: 100" class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30">
        </div>
      </div>

      <!-- Modalidad -->
      <div class="space-y-2">
        <label class="text-sm font-semibold text-on-surface">Modalidad</label>
        <div class="flex flex-wrap gap-4">
          <label class="inline-flex items-center gap-2.5 px-4 py-2.5 border border-border-subtle rounded-lg cursor-pointer hover:bg-surface-container-low transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
            <input type="radio" name="modalidad" class="accent-primary" checked>
            <span class="material-symbols-outlined text-sm text-primary">location_city</span>
            <span class="text-sm font-medium text-on-surface">Presencial</span>
          </label>
          <label class="inline-flex items-center gap-2.5 px-4 py-2.5 border border-border-subtle rounded-lg cursor-pointer hover:bg-surface-container-low transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
            <input type="radio" name="modalidad" class="accent-primary">
            <span class="material-symbols-outlined text-sm text-tertiary">videocam</span>
            <span class="text-sm font-medium text-on-surface">Virtual</span>
          </label>
          <label class="inline-flex items-center gap-2.5 px-4 py-2.5 border border-border-subtle rounded-lg cursor-pointer hover:bg-surface-container-low transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5">
            <input type="radio" name="modalidad" class="accent-primary">
            <span class="material-symbols-outlined text-sm text-warning">hologram</span>
            <span class="text-sm font-medium text-on-surface">Híbrido</span>
          </label>
        </div>
      </div>

      <!-- Fechas -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-on-surface">Fecha de inicio</label>
          <input type="date" class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30">
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-on-surface">Fecha de fin</label>
          <input type="date" class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30">
        </div>
      </div>

      <!-- Descripción -->
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-on-surface">Descripción</label>
        <textarea rows="4" placeholder="Describe el objetivo, contenido y público objetivo del evento..." class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30 resize-none"></textarea>
      </div>

      <!-- Flyer upload -->
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-on-surface">Flyer del evento</label>
        <div class="border-2 border-dashed border-border-subtle rounded-xl p-6 flex flex-col items-center justify-center text-center hover:bg-surface-container-low/60 transition-all group cursor-pointer">
          <span class="material-symbols-outlined text-4xl text-text-secondary mb-2 group-hover:scale-110 transition-transform">image</span>
          <p class="text-sm font-medium text-on-surface mb-1">Subir flyer</p>
          <p class="text-xs text-text-secondary">PNG, JPG o PDF — Máx. 5 MB</p>
          <button class="mt-3 px-4 py-1.5 text-xs font-semibold text-primary border border-primary rounded-lg hover:bg-primary/5 transition-all">Seleccionar archivo</button>
        </div>
      </div>
    </div>
    <div class="px-5 py-4 border-t border-border-subtle bg-surface-bg/20 flex items-center justify-end gap-3">
      <button class="px-4 py-2 text-sm font-semibold text-text-secondary border border-border-subtle rounded-lg hover:bg-surface-container-low transition-all">Cancelar</button>
      <button class="inline-flex items-center gap-2 px-5 py-2 text-sm font-semibold bg-primary text-on-primary rounded-lg hover:brightness-110 transition-all shadow-sm">
        <span class="material-symbols-outlined text-sm">send</span>
        Enviar propuesta
      </button>
    </div>
  </div>
</div>
