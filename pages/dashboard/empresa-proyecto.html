<div class="page-enter space-y-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h2 class="text-2xl font-bold text-on-surface">Solicitar Proyecto</h2>
      <p class="text-text-secondary text-sm mt-0.5">Presenta propuestas de colaboración en I+D con la facultad</p>
    </div>
  </div>

  <!-- Form -->
  <div class="bg-white rounded-xl border border-border-subtle shadow-sm overflow-hidden">
    <div class="px-5 py-4 border-b border-border-subtle">
      <h3 class="text-base font-bold text-on-surface">Información del proyecto</h3>
    </div>
    <div class="p-5 space-y-5">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div class="space-y-1.5 md:col-span-2">
          <label class="text-sm font-semibold text-on-surface">Nombre del proyecto</label>
          <input type="text" placeholder="Ej: Automatización de procesos de control de calidad con visión artificial" class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30">
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-on-surface">Área de conocimiento</label>
          <select class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30">
            <option value="">Seleccionar área</option>
            <option>Ing. Industrial — Operaciones</option>
            <option>Ing. Industrial — Logística</option>
            <option>Ing. Sistemas — TI</option>
            <option>Ing. Software — Desarrollo</option>
            <option>Investigación Operativa</option>
            <option>Inteligencia Artificial</option>
            <option>Big Data / Analytics</option>
            <option>Automatización / IoT</option>
          </select>
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-on-surface">Duración estimada</label>
          <select class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30">
            <option>1 — 3 meses</option>
            <option>3 — 6 meses</option>
            <option>6 — 12 meses</option>
            <option>Más de 12 meses</option>
          </select>
        </div>
      </div>

      <!-- Problema -->
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-on-surface">Descripción del problema / necesidad empresarial</label>
        <textarea rows="3" placeholder="Describe el problema de negocio que motiva este proyecto..." class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30 resize-none"></textarea>
      </div>

      <!-- Objetivo -->
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-on-surface">Objetivo general</label>
        <textarea rows="3" placeholder="Describe el objetivo principal del proyecto..." class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30 resize-none"></textarea>
      </div>

      <!-- Alcance -->
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-on-surface">Alcance y entregables</label>
        <textarea rows="3" placeholder="Define el alcance, resultados esperados y entregables concretos..." class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30 resize-none"></textarea>
      </div>

      <!-- Requisitos -->
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-on-surface">Requisitos técnicos</label>
        <textarea rows="3" placeholder="Recursos necesarios: equipos, software, perfiles de estudiantes/investigadores..." class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30 resize-none"></textarea>
      </div>

      <!-- Restricciones -->
      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-on-surface">Restricciones y consideraciones</label>
        <textarea rows="2" placeholder="Limitaciones técnicas, de tiempo, confidencialidad u otras restricciones relevantes..." class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30 resize-none"></textarea>
      </div>

      <!-- Contacto -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-on-surface">Nombre del contacto</label>
          <input type="text" placeholder="Ej: Juan Pérez" class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30">
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-on-surface">Correo electrónico</label>
          <input type="email" placeholder="jperez@industriasacero.pe" class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30">
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-on-surface">Teléfono</label>
          <input type="text" placeholder="+51 999 888 777" class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30">
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-on-surface">Cargo del contacto</label>
          <input type="text" placeholder="Ej: Gerente de Operaciones" class="w-full px-3.5 py-2.5 text-sm border border-border-subtle rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary bg-surface-bg/30">
        </div>
      </div>
    </div>
    <!-- Flujo de derivación -->
    <div class="px-5 pb-4">
      <div class="bg-primary/5 border border-primary/20 rounded-xl p-4 flex gap-3">
        <span class="material-symbols-outlined text-primary shrink-0 mt-0.5">account_tree</span>
        <div>
          <p class="text-sm font-semibold text-primary mb-2">¿Cómo se procesa tu propuesta?</p>
          <div class="flex flex-wrap items-center gap-1.5 text-xs text-text-secondary">
            <span class="font-medium text-on-surface">1. Envío de propuesta</span>
            <span class="text-border-subtle">→</span>
            <span class="font-medium text-on-surface">2. Revisión Oficina de Vinculación</span>
            <span class="text-border-subtle">→</span>
            <span class="font-medium text-on-surface">3. Derivación a docente/investigador</span>
            <span class="text-border-subtle">→</span>
            <span class="font-medium text-on-surface">4. Respuesta y seguimiento</span>
          </div>
        </div>
      </div>
    </div>

    <div class="px-5 py-4 border-t border-border-subtle bg-surface-bg/20 flex items-center justify-end gap-3">
      <button class="px-4 py-2 text-sm font-semibold text-text-secondary border border-border-subtle rounded-lg hover:bg-surface-container-low transition-all">Cancelar</button>
      <button
        class="inline-flex items-center gap-2 px-5 py-2 text-sm font-semibold bg-primary text-on-primary rounded-lg hover:brightness-110 transition-all shadow-sm"
        onclick="var c=this.closest('.bg-white');c.innerHTML='<div class=\'p-10 text-center\'><span class=\'material-symbols-outlined text-success\' style=\'font-size:56px\'>task_alt</span><h3 class=\'font-bold text-on-surface text-lg mt-3\'>¡Propuesta enviada!</h3><p class=\'text-text-secondary text-sm mt-2 max-w-sm mx-auto\'>La Oficina de Vinculación FIIS revisará tu propuesta y la derivará al docente o investigador más adecuado en un plazo de 5 días hábiles.</p></div>'">
        <span class="material-symbols-outlined text-sm">send</span>
        Enviar solicitud
      </button>
    </div>
  </div>
</div>
