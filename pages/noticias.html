    {

      tipo: 'convocatoria',
      titulo: 'Staff de Desarrollo Técnico - Comunidad UNICODE 2026-II',
      fecha: '18 may 2026',
      cierre: '15 jul 2026',
      requisitos: ['Ser estudiante matriculado de la FIIS', 'Interés en desarrollo web (HTML/JS/React) o diseño de interfaces', 'Disponibilidad de 4 horas semanales para reuniones'],
      estado: 'Vigente',

      estado: 'Cerrado',
      area: 'Oficina de Cooperación Internacional'

  let activeCategory = 'all';

  const gridContainer = document.getElementById('publications-grid');
  const noPubsMsg = document.getElementById('no-publications-msg');
  const categoryBar = document.getElementById('news-category-bar');

  // Renderizar tarjetas según tipo y filtro
  function renderPublicaciones() {
    gridContainer.innerHTML = '';
    
    // Filtrar publicaciones
    const filtradas = DATOS_PUBLICACIONES.filter(pub => {
      const matchesType = pub.tipo === activeType;
      const matchesCategory = activeType !== 'noticia' || activeCategory === 'all' || pub.categoria === activeCategory;
      return matchesType && matchesCategory;
    });

    if (filtradas.length === 0) {
      noPubsMsg.classList.remove('hidden');
      gridContainer.classList.add('hidden');
      return;
    }

    noPubsMsg.classList.add('hidden');
    gridContainer.classList.remove('hidden');

    // Cambiar grilla a 1 columna en comunicados y convocatorias para mayor formalidad y espacio
    if (activeType === 'comunicado' || activeType === 'convocatoria') {
      gridContainer.className = 'grid grid-cols-1 gap-6 max-w-[900px] mx-auto';
    } else {
      gridContainer.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6';
    }

    // Renderizar tarjetas con plantillas diferenciadas (Req 30)
    filtradas.forEach(pub => {
      let cardHtml = '';

      if (pub.tipo === 'noticia') {
        // --- Formato Noticia: Relato e imagen/contexto ---
        cardHtml = `
          <article class="bg-white rounded-xl overflow-hidden border border-border-subtle hover:shadow-xl transition-all duration-300 flex flex-col group">
            <div class="h-44 bg-primary-container/20 flex items-center justify-center relative shrink-0">

              <span class="absolute top-4 left-4 text-xs font-bold px-3 py-1 rounded-full ${pub.badgeCls}">${pub.categoria.charAt(0).toUpperCase() + pub.categoria.slice(1)}</span>

            <div class="p-6 flex flex-col flex-grow justify-between">
              <div>
                <p class="text-text-secondary text-xs mb-2 flex items-center gap-1">
                  <span class="material-symbols-outlined text-xs">calendar_today</span> ${pub.fecha}
                </p>
                <h3 class="text-lg font-bold text-primary mb-2 line-clamp-2 group-hover:text-primary-container transition-colors">${pub.titulo}</h3>
                <p class="text-on-surface-variant text-sm line-clamp-3 mb-4 leading-relaxed">${pub.resumen}</p>
              </div>
              <div class="pt-4 border-t border-border-subtle/50 flex justify-between items-center mt-auto">
                <span class="text-[11px] text-text-secondary font-medium">Área: ${pub.area}</span>
                <a class="text-primary text-xs font-semibold flex items-center gap-1 hover:gap-2 transition-all" href="#">
                  Leer más
                  <span class="material-symbols-outlined text-xs">arrow_forward</span>
                </a>
              </div>
            </div>
          </article>
        `;
      } 
      else if (pub.tipo === 'comunicado') {
        // --- Formato Comunicado: Oficialidad y vigencia ---
        const badgeVigencia = pub.vigencia === 'Vigente' 
          ? '<span class="bg-success/15 text-success px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-success"></span> Vigente</span>'
          : '<span class="bg-surface-variant text-on-surface-variant px-3 py-1 rounded-full text-xs font-bold">Archivado</span>';

        cardHtml = `
          <article class="bg-white rounded-xl border-l-8 border-primary border-t border-r border-b border-border-subtle p-6 hover:shadow-lg transition-all flex flex-col sm:flex-row gap-5">
            <div class="w-14 h-14 bg-primary/10 rounded-xl flex items-center justify-center shrink-0">
              <span class="material-symbols-outlined text-primary text-3xl">campaign</span>
            </div>
            <div class="flex-grow space-y-3">
              <div class="flex flex-wrap items-center justify-between gap-2 border-b border-border-subtle/30 pb-2">
                <div class="flex items-center gap-2">
                  <span class="text-xs font-bold text-primary tracking-wider">${pub.numero}</span>
                  <span class="text-text-secondary text-xs font-medium">· Publicado: ${pub.fecha}</span>
                </div>
                ${badgeVigencia}
              </div>
              <h3 class="text-lg font-bold text-on-surface leading-tight">${pub.titulo}</h3>
              <p class="text-on-surface-variant text-sm leading-relaxed">${pub.contenido}</p>
              <div class="flex justify-between items-center pt-2 text-xs text-text-secondary font-medium">
                <span>Emitido por: ${pub.emisor}</span>
                <span class="bg-surface-container-low px-2.5 py-1 rounded">Área Responsable: ${pub.area}</span>
              </div>
            </div>

        `;

          ? '<span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Abierta</span>'
          : '<span class="bg-rose-100 text-rose-800 px-3 py-1 rounded-full text-xs font-bold">Cerrada</span>';

          <li class="flex items-start gap-2">
            <span class="material-symbols-outlined text-xs text-primary mt-0.5">check_circle</span>
            <span>${req}</span>
          </li>
        `).join('');

        cardHtml = `
          <article class="bg-white rounded-xl border border-border-subtle p-6 hover:shadow-xl transition-all flex flex-col md:flex-row gap-6">
            <div class="flex-grow space-y-4">
              <div class="flex flex-wrap items-center justify-between gap-2 border-b border-border-subtle/30 pb-3">
                <div class="flex items-center gap-2">
                  <span class="text-xs font-bold text-primary uppercase">Área: ${pub.area}</span>
                  <span class="text-text-secondary text-xs">· Publicado: ${pub.fecha}</span>
                </div>
                ${badgeEstado}
              </div>
              <div>
                <h3 class="text-lg font-bold text-on-surface leading-tight">${pub.titulo}</h3>

        categoryBar.classList.remove('hidden');
      } else {

      activeCategory = 'all';
      const catBtns = document.querySelectorAll('.news-cat-btn');
      catBtns.forEach(cb => {
        cb.className = 'news-cat-btn px-4 py-2 rounded-full text-xs font-medium bg-white border border-border-subtle text-on-surface-variant hover:border-primary hover:text-primary transition-all';
      });
      if (catBtns.length > 0) {
        catBtns[0].className = 'news-cat-btn px-4 py-2 rounded-full text-xs font-semibold bg-primary text-on-primary transition-all';
      }

      renderPublicaciones();
    });

  // --- Lógica de Categorías Temáticas ---
  const catButtons = document.querySelectorAll('.news-cat-btn');
  catButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      catButtons.forEach(b => {
        b.className = 'news-cat-btn px-4 py-2 rounded-full text-xs font-medium bg-white border border-border-subtle text-on-surface-variant hover:border-primary hover:text-primary transition-all';
      });
      btn.className = 'news-cat-btn px-4 py-2 rounded-full text-xs font-semibold bg-primary text-on-primary transition-all';
      
      activeCategory = btn.getAttribute('data-category');
      renderPublicaciones();
    });
  });

  // Carga Inicial
  renderPublicaciones();
})();
