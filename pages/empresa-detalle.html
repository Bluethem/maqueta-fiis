  /* ─── Helpers de badges ──────────────────────────────────────────── */
  function tipoBadge(tipo) {
    var m = { 'Práctica': 'bg-blue-50 text-blue-700', 'Empleo': 'bg-green-50 text-green-700', 'Proyecto': 'bg-purple-50 text-purple-700' };
    return m[tipo] || 'bg-surface-container text-text-secondary';
  }
  function modalidadBadge(mod) {
    var m = { 'Presencial': 'bg-amber-50 text-amber-700', 'Híbrido': 'bg-teal-50 text-teal-700', 'Remoto': 'bg-indigo-50 text-indigo-700' };
    return m[mod] || 'bg-surface-container text-text-secondary';
  }

  /* ─── Render de una oportunidad ─────────────────────────────────── */
  function renderOportunidad(op) {
    var estadoBadge = op.estado === 'vigente'
      ? '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-success/10 text-success"><span class="w-1.5 h-1.5 rounded-full bg-success inline-block"></span>Vigente</span>'
      : '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-surface-container-high text-text-secondary">Cerrado</span>';
    var accion = op.estado === 'vigente'
      ? '<button class="px-4 py-2 bg-primary text-on-primary rounded-lg text-xs font-semibold hover:brightness-110 transition-all active:scale-95">Ver convocatoria</button>'
      : '<button disabled class="px-4 py-2 bg-surface-container-high text-text-secondary rounded-lg text-xs font-semibold cursor-not-allowed">Cerrado</button>';
    return '<div class="bg-white rounded-xl border border-border-subtle p-5 card-hover">' +
      '<div class="flex flex-col sm:flex-row sm:items-start gap-4">' +
        '<div class="flex-grow">' +
          '<h4 class="text-sm font-bold text-on-surface mb-1.5">' + op.cargo + '</h4>' +
          '<p class="text-xs text-text-secondary leading-relaxed mb-3">' + op.descripcion + '</p>' +
          '<div class="flex flex-wrap gap-2">' +
            '<span class="inline-block px-2.5 py-0.5 rounded-full text-[10px] font-semibold ' + tipoBadge(op.tipo) + '">' + op.tipo + '</span>' +
            '<span class="inline-block px-2.5 py-0.5 rounded-full text-[10px] font-semibold bg-surface-container text-text-secondary">' + op.carrera + '</span>' +
            '<span class="inline-block px-2.5 py-0.5 rounded-full text-[10px] font-semibold ' + modalidadBadge(op.modalidad) + '">' + op.modalidad + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="flex flex-col items-start sm:items-end gap-2 shrink-0">' +
          estadoBadge +
          '<p class="text-[10px] text-text-secondary flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:11px">calendar_today</span>Cierra: ' + op.cierre + '</p>' +
          accion +
        '</div>' +
      '</div>' +
    '</div>';
  }

  /* ─── Render principal ───────────────────────────────────────────── */

    var id = window.__empresaId || (function() {
      var p = window.location.hash.split('/');
      return p[p.length - 1];
    })();

    var e = EMPRESAS_DATA[id];

    var heroEl = document.getElementById('empresa-hero');
    var tabsEl = document.getElementById('empresa-tabs');

    if (!e) {
      if (heroEl) heroEl.innerHTML = '';
      if (tabsEl) tabsEl.innerHTML =
        '<div class="text-center py-20">' +
          '<span class="material-symbols-outlined text-6xl text-border-subtle">search_off</span>' +
          '<p class="text-on-surface font-bold text-lg mt-4">Empresa no encontrada</p>' +
          '<a href="#/empresas" class="inline-flex items-center gap-2 bg-primary text-on-primary px-6 py-3 rounded-lg font-semibold text-sm hover:brightness-110 mt-6 transition-all">' +
            '<span class="material-symbols-outlined text-sm">arrow_back</span>Volver al directorio</a>' +
        '</div>';
